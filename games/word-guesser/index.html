<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#6a4cff" />
  <title>¡Adivina la Palabra! 🐶</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app game">
    <header class="topbar">
      <a class="btn-menu" href="../../index.html" aria-label="Volver al menú">🏠 Menú</a>
      <h1>¡Adivina la Palabra!</h1>
      <span class="spacer"></span>
      <button class="icon-btn" id="mute" aria-label="Sonido">🔊</button>
    </header>

    <div class="stats">
      <span class="chip" id="stars">⭐ 0</span>
      <span class="chip" id="streak">🔥 0</span>
    </div>

    <div class="clue">
      <div class="emoji" id="emoji">🐶</div>
      <div class="cat" id="cat"></div>
    </div>

    <div class="slots" id="slots"></div>
    <div class="message" id="message"></div>

    <div class="actions">
      <button class="btn btn-pink" id="hint-btn">💡 Pista</button>
    </div>

    <div class="keyboard" id="keyboard"></div>
  </main>

  <!-- Festejo -->
  <div class="overlay" id="overlay">
    <div class="celebrate">
      <div class="big-emoji" id="ov-emoji">🎉</div>
      <div class="word" id="ov-word"></div>
      <div class="praise" id="ov-praise"></div>
      <div class="bonus" id="ov-bonus"></div>
      <button class="btn btn-primary" id="continue-btn">Siguiente ▶</button>
    </div>
  </div>

  <script src="../../js/sound.js"></script>
  <script src="../../js/confetti.js"></script>
  <script src="../../js/speech.js"></script>
  <script src="../../js/progress.js"></script>
  <script src="../../js/qwerty.js"></script>
  <script src="../../js/words.js"></script>
  <script src="../../js/theme.js"></script>
  <script src="game.js"></script>
</body>
</html>
