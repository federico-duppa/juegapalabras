<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#6a4cff" />
  <title>🏅 Medallero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .level-card {
      background: #fff; border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 18px; text-align: center;
      margin: 8px 0 18px;
    }
    .level-card .lvl-emoji { font-size: 3.4rem; line-height: 1; }
    .level-card .lvl-name { font-size: 1.4rem; font-weight: 800; margin: 4px 0 2px; }
    .level-card .lvl-sub { font-size: 0.85rem; color: #6b6391; font-weight: 600; }
    .bar {
      height: 16px; border-radius: 999px; background: #ece8fb;
      overflow: hidden; margin: 12px 0 6px;
    }
    .bar > span {
      display: block; height: 100%;
      background: linear-gradient(90deg, var(--green), var(--blue));
      border-radius: 999px; transition: width 0.5s ease;
    }
    .count-line {
      text-align: center; color: #fff; font-weight: 800;
      margin: 0 0 10px; text-shadow: 0 2px 0 rgba(0,0,0,0.15);
    }
    .medals {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      padding-bottom: 20px;
    }
    .medal {
      background: #fff; border-radius: 18px; box-shadow: var(--shadow);
      padding: 14px 10px; text-align: center;
    }
    .medal .m-emoji { font-size: 2.6rem; line-height: 1; }
    .medal .m-name { font-weight: 800; font-size: 0.95rem; margin: 4px 0 2px; }
    .medal .m-desc { font-size: 0.72rem; color: #6b6391; font-weight: 600; }
    .medal.locked { background: #eee9f7; }
    .medal.locked .m-emoji { filter: grayscale(1) opacity(0.45); }
    .medal.locked .m-name::after { content: " 🔒"; }
    .medal.locked .m-name { color: #9b94bb; }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <a class="icon-btn" href="index.html" aria-label="Volver">🏠</a>
      <h1>🏅 Mi Medallero</h1>
    </header>

    <section class="level-card" id="level-card"></section>
    <p class="count-line" id="count-line"></p>
    <section class="medals" id="medals"></section>
  </main>

  <script src="js/progress.js"></script>
  <script>
    Progress.load();
    const lv = Progress.level();

    document.getElementById("level-card").innerHTML = `
      <div class="lvl-emoji">${lv.emoji}</div>
      <div class="lvl-name">Nivel: ${lv.name}</div>
      <div class="lvl-sub">${lv.stars} palabra${lv.stars === 1 ? "" : "s"} resueltas</div>
      <div class="bar"><span style="width:${Math.round(lv.progress * 100)}%"></span></div>
      <div class="lvl-sub">${lv.isMax ? "¡Nivel máximo! 👑" : `Faltan ${lv.toNext} para ${lv.nextName}`}</div>
    `;

    document.getElementById("count-line").textContent =
      `Medallas: ${Progress.medalsEarnedCount()} de ${Progress.medalsTotal()} 🏅`;

    document.getElementById("medals").innerHTML = Progress.medals().map((m) => `
      <div class="medal ${m.earned ? "" : "locked"}">
        <div class="m-emoji">${m.emoji}</div>
        <div class="m-name">${m.name}</div>
        <div class="m-desc">${m.desc}</div>
      </div>
    `).join("");
  </script>
</body>
</html>
